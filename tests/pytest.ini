[pytest]
minversion = 7.0

; Project root must be importable as `app` and `tests` — see README.md for
; the exact invocation command this depends on.
pythonpath = .

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: fast, isolated tests — no database, no network, no TestClient.
    integration: tests that exercise the database and/or the FastAPI app via TestClient.

addopts =
    -ra
    --strict-markers
    --cov=app
    --cov-config=.coveragerc
    --cov-report=term-missing
    --cov-report=html:htmlcov
